services:
  fregenet-db:
    image: mariadb:11
    container_name: fregenet-itl-db
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: fregenet_international_db
      MYSQL_USER: fregenet_admin
      MYSQL_PASSWORD: FrgITL!Db2026_x7Qm
      MYSQL_ROOT_PASSWORD: FrgITL!Root2026_r4Lp
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - fregenet_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-ufregenet_admin", "-pFrgITL!Db2026_x7Qm", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  fregenet_data:
