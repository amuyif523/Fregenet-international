services:
  fregenet-db:
    image: mariadb:11
    container_name: fregenet-itl-db
    restart: always
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME:-fregenet_international_db}
      MYSQL_USER: ${DB_USER:-fregenet_admin}
      MYSQL_PASSWORD: ${DB_PASSWORD:-change_me_db_password}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-change_me_root_password}
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - fregenet_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mariadb-admin ping -h 127.0.0.1 -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\" --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  fregenet_data:
