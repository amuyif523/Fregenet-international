services:
  fregenet-db:
    image: postgres:17-alpine
    container_name: fregenet-itl-db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-fregenet_international_db}
      POSTGRES_USER: ${DB_USER:-fregenet_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_db_password}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - fregenet_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  fregenet_postgres_data:
